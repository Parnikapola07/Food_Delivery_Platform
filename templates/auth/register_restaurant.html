{% extends 'base.html' %}
{% block title %}Register Restaurant | ZestyEat{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card fade-up" style="max-width:520px;width:min(520px,100%);">
        <div class="brand-wrap">
            <div class="logo-big">🍽</div>
            <h2>Register Your Restaurant</h2>
            <p class="subtitle">Start receiving orders from thousands of customers</p>
        </div>

        <form method="POST" id="registerRestaurantForm">
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label" for="username">Restaurant Name</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="e.g. Royal Biryani House" required autocomplete="organization">
                </div>
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" name="phone" id="phone" class="form-control" placeholder="+91 99999 00000" autocomplete="tel">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="restaurant@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="address">Restaurant Address</label>
                <textarea name="address" id="address" class="form-control" rows="2" placeholder="Full restaurant address" autocomplete="street-address"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Create a strong password" required autocomplete="new-password" minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;font-size:.95rem;" id="registerSubmitBtn">
                Register Restaurant
            </button>
        </form>

        <div class="auth-footer">
            Already registered? <a href="{{ url_for('auth.login', role='restaurant') }}">Log in</a> &nbsp;|&nbsp;
            <a href="{{ url_for('auth.role_select') }}" style="color:var(--ink-400);">Back</a>
        </div>
    </div>
</div>
{% endblock %}
