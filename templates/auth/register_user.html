{% extends 'base_user.html' %}
{% block title %}Sign Up | ZestyEat{% endblock %}

{% block content %}
<div class="container animate-fade-up">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join ZestyEat as a customer</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="grid grid-cols-2" style="gap:16px;">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Delivery Address</label>
                <textarea name="address" class="form-control" rows="2" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary w-full mt-4" style="padding:14px; font-size:16px;">Create Account</button>
        </form>

        <div style="text-align:center; margin-top: 24px;">
            <p style="color:var(--gray); display:inline;">Already have an account?</p>
            <a href="{{ url_for('auth.login', role='user') }}" style="font-weight:600;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
