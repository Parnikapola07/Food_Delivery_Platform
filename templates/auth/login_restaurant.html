{% extends 'base.html' %}
{% block title %}Login — Restaurant | ZestyEat{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="auth-card fade-up">
        <div class="brand-wrap">
            <div class="logo-big">🍽</div>
            <h2>Restaurant Login</h2>
            <p class="subtitle">Manage orders, menus & grow your business</p>
        </div>

        <form method="POST" id="restaurantLoginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" name="email" id="email" class="form-control" placeholder="restaurant@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;font-size:.95rem;" id="loginSubmitBtn">
                Access Dashboard
            </button>
        </form>

        <div class="auth-divider">or</div>

        <a href="{{ url_for('auth.register', role='restaurant') }}" class="btn btn-outline" style="width:100%;justify-content:center;" id="registerRestaurantBtn">Register Your Restaurant</a>

        <div class="auth-footer">
            <a href="{{ url_for('auth.role_select') }}" style="color:var(--ink-400);">← Back to role selection</a>
        </div>
    </div>
</div>
{% endblock %}
