{% extends 'base_user.html' %}
{% block title %}Partner Log In | ZestyEat{% endblock %}

{% block content %}
<div class="container animate-fade-up">
    <div class="auth-card" style="max-width:440px;">
        <div class="auth-header">
            <h2>Restaurant Partner</h2>
            <p>Manage your restaurant menu and orders</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Restaurant Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-full mt-4" style="padding:14px; font-size:16px;">Access Dashboard</button>
        </form>

        <div style="text-align:center; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 24px; padding-top: 24px;">
            <p style="color:var(--gray); margin-bottom:12px;">Want to partner with us?</p>
            <a href="{{ url_for('auth.register', role='restaurant') }}" class="btn btn-outline w-full" style="padding:14px;">Register Restaurant</a>
        </div>
    </div>
</div>
{% endblock %}
