{% extends 'base_user.html' %}
{% block title %}Log In | ZestyEat{% endblock %}

{% block content %}
<div class="container animate-fade-up">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Log in to order delicious food</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" name="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-full mt-4" style="padding:14px; font-size:16px;">Log In</button>
        </form>

        <div style="text-align:center; margin-top: 24px;">
            <p style="color:var(--gray); margin-bottom:12px;">Don't have an account?</p>
            <a href="{{ url_for('auth.register', role='user') }}" class="btn btn-outline w-full" style="padding:14px;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
