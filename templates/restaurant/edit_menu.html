{% extends 'base_restaurant.html' %}
{% block title %}Edit Menu Item | ZestyEat Partner{% endblock %}
{% block page_title %}Edit Menu Item{% endblock %}

{% block content %}
<div class="animate-fade-up" style="max-width: 600px;">
    <div class="card">
        <div class="card-body">
            <form action="{{ url_for('restaurant.edit_menu', item_id=item.id) }}" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Item Name</label>
                    <input type="text" id="name" name="name" class="form-control" required value="{{ item.name }}">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="description">Description</label>
                    <textarea id="description" name="description" class="form-control" rows="3">{{ item.description }}</textarea>
                </div>
                
                <div class="grid grid-cols-2" style="gap: 20px;">
                    <div class="form-group">
                        <label class="form-label" for="price">Price ($)</label>
                        <input type="number" step="0.01" id="price" name="price" class="form-control" required value="{{ item.price }}">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="category">Category</label>
                        <input type="text" id="category" name="category" class="form-control" required value="{{ item.category }}">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="image_url">Image URL</label>
                    <input type="url" id="image_url" name="image_url" class="form-control" value="{{ item.image_url if item.image_url != 'default_food.jpg' else '' }}">
                </div>
                
                <div class="form-group flex align-center gap-2">
                    <input type="checkbox" id="is_active" name="is_active" {% if item.is_active %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary);">
                    <label for="is_active" style="font-weight: 500; cursor: pointer;">Item is active (visible to customers)</label>
                </div>
                
                <div class="flex gap-4 mt-8">
                    <button type="submit" class="btn btn-primary" style="flex:1;">Update Item</button>
                    <a href="{{ url_for('restaurant.manage_menu') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
